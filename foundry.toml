[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
test = "test"
script = "script"
solc = "0.8.30"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
remappings = [
    "@somnia-chain/reactivity-contracts/=node_modules/@somnia-chain/reactivity-contracts/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
somnia_testnet = "https://api.infra.testnet.somnia.network/"

[etherscan]
somnia_testnet = { key = "any", url = "https://shannon-explorer.somnia.network/api" }
